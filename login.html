<!DOCTYPE html>
<html>
<head>
    <title>Login - MIC BANK</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav>
        <h2 class="logo">MIC BANK</h2>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="signup.html" class="nav-btn-outline">Sign Up</a></li>
        </ul>
    </nav>
</header>

<section class="auth-section">

    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p class="subtitle">
            Login to access your SecureBank account securely
        </p>

        <input type="email" placeholder="Email Address">
        <input type="password" placeholder="Password">

        <button class="auth-btn" onclick="goToOTP()">
            Login
        </button>

        <div class="bottom-text">
            Don’t have an account?
            <a href="signup.html">Create Account</a>
        </div>
    </div>

</section>

<footer>
    <p>© 2026 MIC BANK. All rights reserved.</p>
</footer>

<script>
function goToOTP(){

    let savedEmail = localStorage.getItem("userEmail");

    let enteredEmail = document.querySelector("input[type='email']").value;

    if(savedEmail === null){
        alert("No account found! Please sign up first.");
        window.location.href = "signup.html";
        return;
    }

    if(enteredEmail !== savedEmail){
        alert("Email not registered!");
        return;
    }

    window.location.href="otp.html";
}
</script>

</body>
</html>
