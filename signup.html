<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - MIC BANK</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav>
        <h2 class="logo">MIC BANK</h2>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="login.html" class="nav-btn">Login</a></li>
        </ul>
    </nav>
</header>

<section class="auth-section">

    <div class="auth-card">
        <h2>Create Account</h2>
        <p class="subtitle">
            Join SecureBank and secure your account with OTP authentication
        </p>

        <input type="text" id="name" placeholder="Full Name">
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" placeholder="Create Password">

        <button class="auth-btn" onclick="saveData()">
            Create Account
        </button>

        <div class="bottom-text">
            Already have an account?
            <a href="login.html">Login</a>
        </div>
    </div>

</section>

<footer>
    <p>© 2026 MIC BANK. All rights reserved.</p>
</footer>

<script>
function saveData(){
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;

    if(name === "" || email === ""){
        alert("Please fill all fields");
        return;
    }

    localStorage.setItem("userName", name);
    localStorage.setItem("userEmail", email);

    alert("Account created successfully! Please login.");
    window.location.href = "login.html";
}
</script>

</body>
</html>
