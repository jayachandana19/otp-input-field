<!DOCTYPE html>
<html>
<head>
    <title>Verification Successful - MIC BANK</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav>
        <h2 class="logo">MIC BANK</h2>
        <ul>
            <li><a href="index.html">Home</a></li>
        </ul>
    </nav>
</header>

<section class="auth-section">

    <div class="auth-card">
        <div class="success-icon">✅</div>
        <h2>Verification Successful</h2>
        <p class="subtitle">
            Your account has been successfully authenticated.
        </p>

        <div class="success-details">
            <p><strong>Name:</strong> <span id="name"></span></p>
            <p><strong>Email:</strong> <span id="email"></span></p>
            <p><strong>Entered OTP:</strong> <span id="otp"></span></p>
        </div>

        <button class="logout-btn" onclick="logout()">
            Logout
        </button>
    </div>

</section>

<footer>
    <p>© 2026 SecureBank. All rights reserved.</p>
</footer>

<script>
document.getElementById("name").innerText = localStorage.getItem("userName");
document.getElementById("email").innerText = localStorage.getItem("userEmail");

// Hide OTP
let otp = localStorage.getItem("userOTP");

if(otp){
    document.getElementById("otp").innerText = "****";
} else {
    document.getElementById("otp").innerText = "Not Available";
}

function logout(){
    localStorage.clear();
    window.location.href="index.html";
}
</script>

</body>
</html>
